<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroNexus - Pro</title>
    <!-- SIN CDNs: Bootstrap cargado localmente -->
    <link href="{{ url_for('static', filename='vendor/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}?v=3" rel="stylesheet">
</head>
<body>
    <!-- Background Animated Grid / Blobs -->
    <div class="blob-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Floating Pill Navigation (Next-Gen) -->
    <nav class="navbar-floating">
        <a class="nav-pill" href="{{ url_for('main.index') }}" style="font-weight: 800; color: #fff;">NX</a>
        <a class="nav-pill" href="{{ url_for('main.forum') }}">{{ _('nav_forum') }}</a>
        {% if current_user.is_authenticated %}
            <a class="nav-pill" href="{{ url_for('main.collection') }}">{{ _('nav_collection') }}</a>
        {% endif %}
        
        <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.2); margin: 0 0.5rem;"></div>

        <a href="{{ url_for('main.set_lang', lang='es') }}" class="nav-pill" style="padding: 0.6rem 0.6rem;">ES</a>
        <a href="{{ url_for('main.set_lang', lang='en') }}" class="nav-pill" style="padding: 0.6rem 0.6rem;">EN</a>
        
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('auth.logout') }}" class="nav-pill" style="color: rgba(255,100,100,0.8);">{{ _('nav_logout') }}</a>
        {% else %}
            <a href="{{ url_for('auth.login') }}" class="nav-pill" style="color: var(--acc-ice);">{{ _('nav_login') }}</a>
        {% endif %}
    </nav>

    <!-- Main Content Area -->
    <main class="main-wrapper container">
        {% block content %}{% endblock %}
    </main>

    <!-- SIN CDNs -->
    <script src="{{ url_for('static', filename='vendor/bootstrap.bundle.min.js') }}"></script>
</body>
</html>
